name: 🚀 CI/CD Mo'cyno Platform
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: 🧪 Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 🛠️ Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Types (shared dependency) ---
      - name: 🔩 Build shared types
        run: cd packages/types && npx tsc

      # --- Admin ---
      - name: 🧹 Lint Admin
        run: cd admin && pnpm lint

      - name: 🧪 Test Admin
        run: cd admin && npx vitest run

      - name: 🔨 Build Admin
        run: cd admin && npx vite build

      # --- Client Portal ---
      - name: 🔨 Build Client Portal
        run: cd apps/clients && npx tsc -b && npx vite build

      # --- Mobile ---
      - name: 🧹 Lint Mobile
        run: cd mobile && pnpm lint

      - name: 🔨 Build Mobile
        run: cd mobile && npx tsc -b && npx vite build

      # --- Functions ---
      - name: 🔍 Functions load check
        run: cd functions && npm install && node -e "require('./index.js'); console.log('✅ Functions load OK')"

  deploy:
    name: 🚀 Deploy to Firebase
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 🛠️ Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔩 Build shared types
        run: cd packages/types && npx tsc

      - name: 🔨 Build Admin
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: cd admin && npx vite build

      - name: 🔨 Build Client Portal
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: cd apps/clients && npx tsc -b && npx vite build

      - name: 🔨 Build Mobile
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: cd mobile && npx tsc -b && npx vite build

      - name: 🚀 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SA }}
          channelId: live
          projectId: mocyno
          target: prodsite

      - name: 🔗 Post-deploy validation
        run: |
          test "$(curl -sI https://mocyno.com/ | tr -d '\r' | awk '/^[Ll]ocation:/ {sub("https://mocyno.com", "", $2); print $2}')" = "/fr/"
          test "$(curl -sI https://mocyno.com/services/ | tr -d '\r' | awk '/^[Ll]ocation:/ {sub("https://mocyno.com", "", $2); print $2}')" = "/fr/services/"
          test "$(curl -sI https://mocyno.com/contact/ | tr -d '\r' | awk '/^[Ll]ocation:/ {sub("https://mocyno.com", "", $2); print $2}')" = "/fr/contact/"
          test "$(curl -sI https://mocyno.com/zones/toulon/ | tr -d '\r' | awk '/^[Ll]ocation:/ {sub("https://mocyno.com", "", $2); print $2}')" = "/fr/zones/toulon/"
          curl -fsS https://mocyno.com/fr/ > /dev/null
          echo "✅ Production deployment verified!"
