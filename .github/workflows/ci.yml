name: "Anti-regression CI"

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build_admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root dependencies
        run: npm ci
      - name: Install admin dependencies
        run: cd admin && npm ci
      - name: Typecheck admin
        run: cd admin && npm run typecheck
      - name: Build admin
        run: cd admin && npm run build

  audit_data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Prepare credentials
        run: |
          echo "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}" > /tmp/sa.json
      - name: Run strict data audit
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          FIREBASE_PROJECT_ID: "mocyno"
        run: npm run audit:data:strict

  forbidden_fields:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check for forbidden fields
        run: npm run lint:forbidden

  functions_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install functions dependencies
        run: cd functions && npm install --no-audit --no-fund
      - name: Verify exports
        run: |
          node -e "
          try {
            const f = require('./functions/index.js');
            const required = ['adminInitStatsMeta', 'adminRebuildShiftsFromPlanning', 'rebuildShiftsForPlanning'];
            const missing = required.filter(n => typeof f[n] !== 'function');
            if (missing.length > 0) {
              console.error('Missing exports:', missing);
              process.exit(1);
            }
            console.log('OK: Functions index is valid and contains critical exports.');
          } catch (e) {
            console.error('CRASH: Functions index failed to load', e.message);
            process.exit(1);
          }
          "
